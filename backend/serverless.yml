#Serverless framework yml 

service: serverless-aws-nodejs

useDotenv: true
plugins:
  - serverless-offline
  - serverless-dotenv-plugin

provider:
  name: aws
  runtime: nodejs18.x
  stage: developer
  region: us-east-1

functions:
    app:
      handler: src/index.handler
      events:
        - http:
            path: /
            method: ANY
        - http:
            path: /{proxy+}
            method: ANY

environment:
  DB_HOST: ${env:DB_HOST}
  DB_USER: ${env:DB_USER}
  DB_PASSWORD: ${env:DB_PASSWORD}
  DB_NAME: ${env:DB_NAME}
  JWT_SECRET: ${env:JWT_SECRET}
